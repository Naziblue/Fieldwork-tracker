<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Promote to Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center">

    <div class="max-w-md w-full bg-slate-800 p-8 rounded-2xl border border-white/10 shadow-2xl">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold mb-2">Admin Promotion Tool</h1>
            <p class="text-slate-400 text-sm">Grant global admin privileges to your account.</p>
        </div>

        <div id="auth-section">
            <button id="login-btn"
                class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-500 text-white font-medium rounded-lg transition-colors">
                Sign in to Claim Admin
            </button>
        </div>

        <div id="status" class="hidden mt-4 p-4 bg-slate-900/50 rounded-lg text-sm text-center"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAl4i1nP24SOvAt1ifbGD0SZo2u_l4MnB8",
            authDomain: "fieldwork-tracker-ae8f7.firebaseapp.com",
            projectId: "fieldwork-tracker-ae8f7",
            storageBucket: "fieldwork-tracker-ae8f7.firebasestorage.app",
            messagingSenderId: "4649951899",
            appId: "1:4649951899:web:28278ddb278baf67b39c3e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const statusEl = document.getElementById('status');

        function setStatus(msg, type = 'info') {
            statusEl.classList.remove('hidden');
            statusEl.textContent = msg;
            statusEl.className = `mt-4 p-4 rounded-lg text-sm text-center ${type === 'error' ? 'bg-red-500/10 text-red-400' : 'bg-green-500/10 text-green-400'}`;
        }

        document.getElementById('login-btn').addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch (e) {
                setStatus(e.message, 'error');
            }
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                if (user.email !== 'nana.behesht@gmail.com') {
                    setStatus(`Error: ${user.email} is not authorized for promotion. Only nana.behesht@gmail.com is allowed.`, 'error');
                    return;
                }

                setStatus(`Processing account: ${user.email}...`);

                try {
                    const userRef = doc(db, 'users', user.uid);
                    await setDoc(userRef, {
                        role: 'admin',
                        isAdmin: true, // Legacy/Redundant check
                        promotedAt: new Date().toISOString()
                    }, { merge: true });

                    setStatus(`SUCCESS! ${user.email} is now an Admin. Redirecting...`);

                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 2000);

                } catch (error) {
                    console.error(error);
                    setStatus(`Database Error: ${error.message}. (Did you update Security Rules?)`, 'error');
                }
            }
        });
    </script>
</body>

</html>
